<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="color-scheme" content="dark" />

    <title>GT Music - Your Personal Music Universe</title>
    <meta
      name="description"
      content="A premium, ad-free personal music streaming experience. Stream your own library anywhere."
    />
    <meta name="author" content="GT Music" />
    <meta
      name="keywords"
      content="music player, personal music, streaming, ad-free, PWA music app, GT Music, web music player"
    />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GT Music" />
    <meta name="application-name" content="GT Music" />

    <meta property="og:site_name" content="GT Music" />
    <meta property="og:title" content="GT Music - Your Personal Music Universe" />
    <meta
      property="og:description"
      content="A premium, ad-free personal music streaming experience."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GT Music" />
    <meta
      name="twitter:description"
      content="Your personal music universe - premium streaming from your own library."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <script>
      (function () {
        try {
          var raw = localStorage.getItem('gt-settings');
          var parsed = raw ? JSON.parse(raw) : null;
          var theme = parsed && parsed.theme ? parsed.theme : 'dark';
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var isLight = theme === 'light' || (theme === 'system' && prefersLight);
          var root = document.documentElement;
          var viewport = window.visualViewport;
          var viewportHeight = Math.round(
            (viewport && viewport.height) ||
            window.innerHeight ||
            document.documentElement.clientHeight ||
            0
          );
          var viewportWidth = Math.round(
            (viewport && viewport.width) ||
            window.innerWidth ||
            document.documentElement.clientWidth ||
            0
          );
          if (viewportHeight) root.style.setProperty('--app-height', viewportHeight + 'px');
          if (viewportWidth) root.style.setProperty('--app-width', viewportWidth + 'px');
          root.style.setProperty('--app-viewport-top', ((viewport && viewport.offsetTop) || 0) + 'px');
          root.style.setProperty('--app-viewport-left', ((viewport && viewport.offsetLeft) || 0) + 'px');
          root.classList.toggle('light', isLight);
          root.style.colorScheme = isLight ? 'light' : 'dark';
          root.style.backgroundColor = isLight ? '#fafafa' : '#0a0a0f';
          var appHeight = viewportHeight ? viewportHeight + 'px' : '100dvh';
          document.write('<style>html,body,#root{background:' + (isLight ? '#fafafa' : '#0a0a0f') + ';height:var(--app-height,' + appHeight + ');min-height:var(--app-height,' + appHeight + ');overflow:hidden}</style>');
        } catch {}
      })();
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "GT Music",
        "description": "A premium, ad-free personal music streaming experience.",
        "applicationCategory": "MultimediaApplication",
        "applicationSubCategory": "MusicApplication",
        "operatingSystem": "Web, iOS, Android",
        "browserRequirements": "Requires JavaScript and a modern browser",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body style="background:#0a0a0f">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
